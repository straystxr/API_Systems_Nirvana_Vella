<ion-content [fullscreen]="true">
  <div class="login-wrapper">

    <!--Logo section-->
    <div class="logo-section">
      <div class="logo">
          <img src="assets/FlashPoint_Graphics/logo.svg" alt="Flash logo" class="logo-img"/>
      </div>
    </div>

    <!--Login section-->
    <div class="login-card">
      <h1 class="login-title">Login</h1>

      <div class="form-group">
        <input
          type="text"
          class="form-input"
          placeholder="Email"
          [(ngModel)]="email"
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          class="form-input"
          placeholder="Password"
          [(ngModel)]="password"
        />
      </div>

      <div class="forgot-password">
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>

      <button class="login-btn" (click)="login()">
        Login
      </button>

      <!--Error message-->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!--Divider-->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">Or login with:</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button class="social-btn" aria-label="Login with Facebook">
          <!--add social media icon-->
        </button>
        <button class="social-btn" aria-label="Login with Twitter">
          <!--add social media icon-->
        </button>
        <button class="social-btn" aria-label="Login with Google">
          <!--add social media icon-->
        </button>
      </div>

      <p class="signup-text">
        <!--href to registration page to be added-->
        Don't have an account? <a href="#" class="signup-link">Sign Up</a>
      </p>

      <p class="brand-footer">FlashPoint MT</p>
    </div>

  </div>
</ion-content>
