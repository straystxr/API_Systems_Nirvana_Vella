<ion-content [fullscreen]="true">
  <div class="login-wrapper">

    <!--Logo section-->
    <div class="logo-section">
      <div class="logo">
        <img src="assets/FlashPoint_Graphics/logo.svg" alt="Flash logo" class="logo-img"/>
      </div>
    </div>

    <!--Login section-->
    <div class="login-card">
      <h1 class="login-title">Login</h1>

      <div class="form-group">
        <input
          type="text"
          class="form-input"
          placeholder="Username"
          [(ngModel)]="username"
        />
      </div>

      <div class="form-group password-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-input"
          placeholder="Password"
          [(ngModel)]="password"
        />
        <button class="toggle-password" (click)="showPassword = !showPassword" type="button">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </button>
      </div>

      <div class="forgot-password">
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>

      <button class="login-btn" (click)="login()">
        Login
      </button>

      <!--Error message-->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!--Divider-->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">Or login with:</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social Login -->
      <div class="social-login">

        <!-- Facebook -->
        <button class="social-btn facebook-btn" aria-label="Login with Facebook">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="#1877F2">
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
        </button>

        <!-- Google -->
        <button class="social-btn google-btn" aria-label="Login with Google">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </button>

        <!-- Twitter / X -->
        <button class="social-btn twitter-btn" aria-label="Login with Twitter">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="#000000">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </button>

      </div>

      <p class="signup-text">
        Don't have an account? <a href="#" class="signup-link">Sign Up</a>
      </p>

      <p class="brand-footer">FlashPoint MT</p>
    </div>

  </div>
</ion-content>
